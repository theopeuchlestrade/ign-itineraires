name: Feature request
description: Suggest a route planning or navigation improvement.
title: "Feature: "
labels:
  - feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the intended behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy, network, and permissions
      description: Explain whether this changes transmitted data, hosts, permissions, background location, analytics, or local storage.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized screenshots, public test locations, links, or implementation notes.
