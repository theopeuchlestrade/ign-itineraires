<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="ignGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004080;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rectangle (optional subtle effect) -->
  <rect x="0" y="0" width="400" height="100" rx="8" fill="url(#ignGradient)" opacity="0.1"/>
  
  <!-- IGN Text -->
  <text x="20" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0066CC">
    IGN
  </text>
  
  <!-- Separator line -->
  <line x1="120" y1="30" x2="120" y2="70" stroke="#004080" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Itinéraires Text -->
  <text x="140" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="600" fill="#004080">
    Itinéraires
  </text>
</svg>
