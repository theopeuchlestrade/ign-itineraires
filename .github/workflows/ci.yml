name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo ghcr.io/gitleaks/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 detect --source=. --redact=100 --verbose

  dependency-audit:
    name: Dependency vulnerability audit
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan Dart and npm lockfiles
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pubspec.lock
            --lockfile=package-lock.json

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review dependency changes
        if: github.event_name == 'pull_request' && github.event.repository.private == false
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
      - name: Explain unavailable dependency review
        if: github.event_name != 'pull_request' || github.event.repository.private
        run: echo "Dependency Review only evaluates pull requests in supported repositories."

  quality:
    name: Quality, tests and coverage
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart format --output=none --set-exit-if-changed lib test integration_test test_driver tool
      - run: flutter analyze
      - run: flutter test --coverage --exclude-tags "live || golden"
      - name: Verify the opt-in diagnostics overlay
        run: >-
          flutter test --dart-define=GUIDANCE_DIAGNOSTICS=true
          test/navigation_page_test.dart
          --plain-name "toggles coordinate-free diagnostics with the build flag"
      - run: dart run tool/check_coverage.dart
      - run: ruby scripts/check_release_metadata.rb --source
      - run: ruby scripts/check_release_metadata.rb --deployment
      - run: sh scripts/build_web_release.sh /ign-itineraires/
      - run: ruby scripts/check_web_release.rb build/web /ign-itineraires/
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Smoke-test the exact Pages artifact
        run: |
          set -euo pipefail
          mkdir -p build/pages/ign-itineraires
          cp -R build/web/. build/pages/ign-itineraires/
          python3 -m http.server 8081 --directory build/pages >/tmp/pages-server.log 2>&1 &
          server_pid="$!"
          trap 'kill "${server_pid}" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8081/ign-itineraires/ >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 20 ]; then
              cat /tmp/pages-server.log
              exit 1
            fi
            sleep 1
          done
          SMOKE_URL=http://127.0.0.1:8081/ign-itineraires/ npm run smoke:web
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: github.event_name == 'push'
        with:
          path: build/web

  linux-goldens:
    name: Linux golden tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter test test/app_responsive_test.dart

  web-integration:
    name: Chrome integration flow
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
      - uses: nanasess/setup-chromedriver@ef5c64a93512d266b23b80bae95e46a67f30e703 # v2
      - run: flutter pub get --enforce-lockfile
      - name: Start ChromeDriver
        run: chromedriver --port=4444 &
      - name: Run deterministic web journey
        run: >-
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/app_flow_test.dart
          -d web-server
          --web-port=7357
          --browser-name=chrome
          --timeout=120
          --no-web-resources-cdn
          --screenshot=build/test-screenshots
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: web-integration-screenshots
          path: build/test-screenshots
          if-no-files-found: ignore

  android-build:
    name: Android build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --debug

  ios-build:
    name: iOS simulator build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build ios --simulator --no-codesign
      - name: Boot an iPhone simulator
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')"
          test -n "${device_id}"
          xcrun simctl boot "${device_id}" || true
          xcrun simctl bootstatus "${device_id}" -b
          echo "IOS_SIMULATOR_ID=${device_id}" >> "${GITHUB_ENV}"
      - name: Run the deterministic guidance journey on iOS
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p build/guidance-reports
          flutter test integration_test/guidance_replay_test.dart -d "${IOS_SIMULATOR_ID}" --file-reporter json:build/guidance-reports/ios-simulator.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        with:
          name: ios-guidance-report
          path: build/guidance-reports
          if-no-files-found: ignore

  container:
    name: Production web container
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: docker build --check .
      - run: docker build --tag ign-itineraires:ci .
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Smoke-test the production container
        run: |
          set -euo pipefail
          container_id="$(docker run --detach --publish 127.0.0.1:8080:8080 ign-itineraires:ci)"
          trap 'docker rm --force "${container_id}" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              docker logs "${container_id}"
              exit 1
            fi
            sleep 1
          done
          REQUIRE_SECURITY_HEADERS=true npm run smoke:web

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - workflow-lint
      - secret-scan
      - quality
      - container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy tested Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  ci:
    name: IGN Itineraires CI
    if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    needs:
      - workflow-lint
      - secret-scan
      - dependency-audit
      - dependency-review
      - quality
      - linux-goldens
      - web-integration
      - android-build
      - ios-build
      - container
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.workflow-lint.result }}" != "success" ] ||
             [ "${{ needs.secret-scan.result }}" != "success" ] ||
             [ "${{ needs.dependency-audit.result }}" != "success" ] ||
             [ "${{ needs.dependency-review.result }}" != "success" ] ||
             [ "${{ needs.quality.result }}" != "success" ] ||
             [ "${{ needs.linux-goldens.result }}" != "success" ] ||
             [ "${{ needs.web-integration.result }}" != "success" ] ||
             [ "${{ needs.android-build.result }}" != "success" ] ||
             [ "${{ needs.ios-build.result }}" != "success" ] ||
             [ "${{ needs.container.result }}" != "success" ]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi

  live-contracts:
    name: Live Géoplateforme contracts
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter test test/live --tags live --concurrency=1

  android-api-24:
    name: Android integration on API 24
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 24
          target: default
          arch: x86_64
          profile: pixel_2
          script: |
            mkdir -p build/guidance-reports
            flutter test integration_test/guidance_replay_test.dart -d emulator-5554 --file-reporter json:build/guidance-reports/android-api-24.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: android-api-24-screenshots
          path: |
            build/test-screenshots
            build/guidance-reports
          if-no-files-found: ignore
