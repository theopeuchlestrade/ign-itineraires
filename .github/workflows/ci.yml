name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Run actionlint
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo ghcr.io/gitleaks/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 detect --source=. --redact=100 --verbose

  quality:
    name: Quality, tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart format --output=none --set-exit-if-changed lib test integration_test test_driver tool
      - run: flutter analyze
      - run: flutter test --coverage --exclude-tags "live || golden"
      - run: dart run tool/check_coverage.dart
      - run: ruby scripts/check_release_metadata.rb --source
      - run: flutter build web --release

  linux-goldens:
    name: Linux golden tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter test test/app_responsive_test.dart

  web-integration:
    name: Chrome integration flow
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: browser-actions/setup-chrome@v2
      - uses: nanasess/setup-chromedriver@v2
      - run: flutter pub get --enforce-lockfile
      - name: Start ChromeDriver
        run: chromedriver --port=4444 &
      - name: Run deterministic web journey
        run: >-
          flutter drive
          --driver=test_driver/integration_test.dart
          --target=integration_test/app_flow_test.dart
          -d web-server
          --web-port=7357
          --browser-name=chrome
          --timeout=120
          --screenshot=build/test-screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-integration-screenshots
          path: build/test-screenshots
          if-no-files-found: ignore

  android-build:
    name: Android build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --debug

  ios-build:
    name: iOS simulator build
    if: github.event_name != 'schedule'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build ios --simulator --no-codesign

  container:
    name: Production web container
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.1.0
      - run: docker build --check .
      - run: docker build --tag ign-itineraires:ci .
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Smoke-test the production container
        run: |
          set -euo pipefail
          container_id="$(docker run --detach --publish 127.0.0.1:8080:8080 ign-itineraires:ci)"
          trap 'docker rm --force "${container_id}" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              docker logs "${container_id}"
              exit 1
            fi
            sleep 1
          done
          npm run smoke:web

  live-contracts:
    name: Live Géoplateforme contracts
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter test test/live --tags live --concurrency=1

  android-api-24:
    name: Android integration on API 24
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 24
          target: default
          arch: x86_64
          profile: pixel_2
          script: flutter test integration_test/app_flow_test.dart -d emulator-5554
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-api-24-screenshots
          path: build/test-screenshots
          if-no-files-found: ignore
