name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review-unavailable:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip on private repositories
        run: |
          echo "Dependency Review is unavailable on private GitHub Free repositories."
          echo "The workflow will become active when the repository is public or the GitHub plan changes."

  dependency-review:
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: critical
