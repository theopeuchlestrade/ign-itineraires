name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review-unavailable:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip on private repositories
        run: |
          echo "Dependency Review is unavailable on private GitHub Free repositories."
          echo "The workflow will become active when the repository is public or the GitHub plan changes."

  dependency-review:
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
