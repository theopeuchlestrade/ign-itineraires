name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-rebase:
    name: Validate PR is up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check if PR is based on latest main
        run: |
          set -euo pipefail
          BASE_BRANCH="${{ github.base_ref }}"
          echo "Base branch: $BASE_BRANCH"
          
          # Check if base branch HEAD is an ancestor of PR branch
          if ! git merge-base --is-ancestor refs/remotes/origin/$BASE_BRANCH HEAD; then
            echo "::error::PR branch is not up-to-date with $BASE_BRANCH"
            echo "Please rebase your branch on the latest $BASE_BRANCH and resolve any conflicts"
            exit 1
          fi
          echo "✅ PR branch is up-to-date with $BASE_BRANCH"
