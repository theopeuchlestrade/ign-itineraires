name: Require Owner Approval

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: require-owner-approval-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-owner-approval:
    name: Check Owner Approval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR details and reviews
        id: get-data
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.number;
            
            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            
            // Get all reviews for this PR
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            
            // Filter for APPROVED reviews only and extract reviewer logins
            const approvers = reviews
              .filter(review => review.state === 'APPROVED')
              .map(review => review.user.login);
            
            return {
              prAuthor: pr.user.login,
              prNumber: pr.number,
              prHeadSha: pr.head.sha,
              approvers: approvers
            };

      - name: Validate approvals
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = ${{ steps.get-data.outputs.prAuthor }};
            const approvers = ${{ steps.get-data.outputs.approvers }};
            const requiredOwner = 'theopeuchlestrade';
            
            // No approvals found
            if (approvers.length === 0) {
              return {
                valid: false,
                message: 'No approvals found. At least one approval from @' + requiredOwner + ' is required.'
              };
            }
            
            // Check each approver
            const invalidApprovals = [];
            for (const approver of approvers) {
              // Self-approval by the owner is allowed
              if (approver === requiredOwner && prAuthor === requiredOwner) {
                continue;
              }
              
              // Only the owner can approve
              if (approver !== requiredOwner) {
                invalidApprovals.push('@' + approver);
              }
            }
            
            // Check if there's at least one valid approval from the owner
            const hasValidOwnerApproval = approvers.includes(requiredOwner);
            
            if (!hasValidOwnerApproval) {
              return {
                valid: false,
                message: 'No approval from @' + requiredOwner + ' found. Only @' + requiredOwner + ' can approve PRs.'
              };
            }
            
            if (invalidApprovals.length > 0) {
              return {
                valid: false,
                message: 'Invalid approval(s) from: ' + invalidApprovals.join(', ') + '. Only @' + requiredOwner + ' can approve.'
              };
            }
            
            return {
              valid: true,
              message: 'Owner approval validated successfully.'
            };

      - name: Publish status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const valid = ${{ steps.validate.outputs.valid }};
            const message = ${{ steps.validate.outputs.message }};
            const prHeadSha = ${{ steps.get-data.outputs.prHeadSha }};
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: prHeadSha,
              state: valid ? 'success' : 'failure',
              description: 'Owner Approval Check',
              context: 'owner-approval'
            });
            
            if (!valid) {
              core.setFailed(message);
            }
