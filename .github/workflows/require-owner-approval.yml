name: Require Owner Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  statuses: write

concurrency:
  group: require-owner-approval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-owner-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Create placeholder status check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No PR in context');
              return;
            }
            
            const prNumber = pr.number;
            const headSha = pr.head.sha;
            
            console.log('PR number:', prNumber);
            console.log('Head SHA:', headSha);
            
            // For now, just create a success status
            // TODO: Add validation logic
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state: 'success',
              description: 'Owner Approval Check',
              context: 'owner-approval'
            });
