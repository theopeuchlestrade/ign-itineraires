name: Require Owner Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-owner-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Create status check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No PR in context, exiting');
              return;
            }
            
            const headSha = pr.head.sha;
            
            // Simple version - just create success status
            // Full validation will be added later
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headSha,
                state: 'success',
                description: 'Owner Approval Check',
                context: 'check-owner-approval'
              });
              console.log('Status check created successfully');
            } catch (error) {
              console.log('Error creating status check:', error);
              core.setFailed(error.message);
            }
