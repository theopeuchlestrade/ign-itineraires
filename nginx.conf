server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  set $map_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://data.geopf.fr; font-src 'self' data:; connect-src 'self' https://data.geopf.fr; form-action 'self'; manifest-src 'self'; media-src 'self' blob: data:;";

  add_header Content-Security-Policy $map_csp always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=()" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  location ~* ^/(?:index\.html|flutter_bootstrap(?:\.[0-9a-f]+)?\.js|flutter_service_worker\.js|version\.json|manifest\.json)$ {
    expires -1;
    try_files $uri =404;
  }

  location ~* ^/(?:main|flutter_bootstrap)\.[0-9a-f]+\.(?:dart\.)?js$ {
    expires 1y;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|wasm|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf|bin)$ {
    expires 7d;
    try_files $uri =404;
  }
}
